name: sge-utils
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────
  - python=3.11

  # ── Core data science ────────────────────────────────
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - openpyxl

  # ── Visualisation ────────────────────────────────────
  - altair
  - matplotlib
  - seaborn

  # ── Bioinformatics ───────────────────────────────────
  - pyfaidx
  - biopython
  - samtools               # CLI available in env
  - bedtools

  # ── Notebook + kernel ────────────────────────────────
  - jupyterlab
  - ipykernel
  - ipywidgets

  # ── Utilities ────────────────────────────────────────
  - tqdm                   # progress bars
  - rich                   # pretty terminal output
  - natsort
  - vl-convert-python
